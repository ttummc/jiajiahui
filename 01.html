            function getFilteredFilesForStats() {
                const counts = { doc: 0, img: 0, vid: 0, aud: 0, arc: 0, code: 0, other: 0 };
                let files = [...fileData];
                if (searchQuery.trim()) {
                    const q = searchQuery.trim().toLowerCase();
                    files = files.filter(f => f.name.toLowerCase().includes(q) || f.ext.toLowerCase().includes(q));
                }
                files.forEach(f => {
                    const catMap = { document: 'doc', image: 'img', video: 'vid', audio: 'aud', archive: 'arc',
                        code: 'code' };
                    const cat = catMap[f.type] || 'other';
                    counts[cat] = (counts[cat] || 0) + 1;
                });
                return counts;
            }

            function updateStorageStats() {
                const files = getFilteredFiles();
                const catSizes = { doc: 0, img: 0, vid: 0, aud: 0, arc: 0, code: 0, other: 0 };
                let totalSize = 0;
                files.forEach(f => {
                    const catMap = { document: 'doc', image: 'img', video: 'vid', audio: 'aud', archive: 'arc',
                        code: 'code' };
                    const cat = catMap[f.type] || 'other';
                    catSizes[cat] += f.size;
                    totalSize += f.size;
                });
                storageTotal.textContent = '筛选结果总计: ' + formatBytes(totalSize);
                const segs = storageBar.querySelectorAll('.storage-bar__segment');
                segs.forEach(seg => {
                    const cat = seg.classList.contains('seg-doc') ? 'doc' :
                        seg.classList.contains('seg-img') ? 'img' :
                        seg.classList.contains('seg-vid') ? 'vid' :
                        seg.classList.contains('seg-aud') ? 'aud' :
                        seg.classList.contains('seg-arc') ? 'arc' :
                        seg.classList.contains('seg-code') ? 'code' : 'other';
                    const pct = totalSize > 0 ? (catSizes[cat] / totalSize * 100) : 0;
                    seg.style.width = pct + '%';
                });
            }

            // ==================== 下载逻辑 ====================
            function simulateDownload(fileId, fileName, fileSize) {
                // 检查是否已在队列中
                if (downloadQueue.some(d => d.id === fileId && (d.status === 'downloading' || d.status === 'pending'))) {
                    return;
                }
                // 移除之前的完成记录
                downloadQueue = downloadQueue.filter(d => !(d.id === fileId && d.status === 'done'));

                const dlItem = { id: fileId, name: fileName, size: fileSize, progress: 0, status: 'pending' };
                downloadQueue.unshift(dlItem);
                renderDownloadPanel();
                showDownloadPanel();

                // 开始下载
                dlItem.status = 'downloading';
                renderFileArea();
                renderDownloadPanel();

                const totalSteps = 20;
                const baseInterval = 80;
                // 模拟进度，较大文件稍慢
                const interval = Math.max(40, baseInterval + Math.floor(fileSize / 500000) * 10);
                let step = 0;
                const timer = setInterval(() => {
                    step++;
                    dlItem.progress = Math.min(100, Math.round((step / totalSteps) * 100));
                    renderDownloadPanelItem(dlItem);
                    if (step >= totalSteps) {
                        clearInterval(timer);
                        dlItem.status = 'done';
                        dlItem.progress = 100;
                        // 实际触发浏览器下载
                        triggerRealDownload(fileName, fileSize);
                        renderFileArea();
                        renderDownloadPanel();
                        updateDlClearButton();
                    }
                }, interval);

                // 存储timer以便可能的取消操作
                dlItem._timer = timer;
            }

            function triggerRealDownload(fileName, fileSize) {
                try {
                    // 生成模拟文件内容
                    let content = '';
                    const ext = fileName.split('.').pop().toLowerCase();
                    const textExts = ['txt', 'md', 'js', 'css', 'html', 'json', 'xml', 'yaml', 'yml', 'sql', 'sh', 'py',
                        'java', 'cpp', 'ts', 'svg', 'csv'
                    ];
                    if (textExts.includes(ext) || fileSize < 50000) {
                        // 文本文件：生成有意义的模拟内容
                        content = generateMockContent(fileName, ext);
                    } else {
                        // 二进制文件：生成随机填充
                        content = 'BINARY_FILE_PLACEHOLDER_' + 'X'.repeat(Math.min(fileSize, 3000));
                    }
                    const blob = new Blob([content], { type: 'application/octet-stream' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = fileName;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    setTimeout(() => URL.revokeObjectURL(url), 1000);
                } catch (e) {
                    console.warn('下载触发失败:', e);
                }
            }

            function generateMockContent(fileName, ext) {
                const lines = [];
                lines.push('# ' + fileName);
                lines.push('# 生成时间: ' + new Date().toISOString());
                lines.push('');
                if (['js', 'ts'].includes(ext)) {
                    lines.push('// JavaScript/TypeScript 模块');
                    lines.push('const config = {');
                    lines.push('  appName: "FileHub",');
                    lines.push('  version: "1.0.0",');
                    lines.push('  maxFileSize: 100 * 1024 * 1024,');
                    lines.push('};');
                    lines.push('export default config;');
                } else if (ext === 'css') {
                    lines.push('/* 样式表 */');
                    lines.push(':root {');
                    lines.push('  --primary: #3b5cb8;');
                    lines.push('  --surface: #faf8ff;');
                    lines.push('}');
                } else if (ext === 'html') {
                    lines.push('<!DOCTYPE html>');
                    lines.push('<html><head><title>' + fileName + '</title></head>');
                    lines.push('<body><h1>Hello FileHub</h1></body></html>');
                } else if (ext === 'json') {
                    lines.push(JSON.stringify({ name: fileName, timestamp: Date.now(), version: '1.0' }, null, 2));
                } else if (ext === 'md') {
                    lines.push('## ' + fileName.replace('.md', ''));
                    lines.push('这是一份Markdown格式的文档。');
                    lines.push('- 项目: FileHub');
                    lines.push('- 日期: ' + new Date().toLocaleDateString());
                } else if (ext === 'sql') {
                    lines.push('-- SQL 备份');
                    lines.push('CREATE TABLE files (id INT, name VARCHAR(255), size BIGINT);');
                    lines.push('INSERT INTO files VALUES (1, \'example.txt\', 1024);');
                } else if (ext === 'svg') {
                    lines.push(
                        '<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect width="100" height="100" fill="#3b5cb8"/></svg>'
                        );
                } else {
                    lines.push('文件: ' + fileName);
                    lines.push('这是由 FileHub 生成的模拟文件内容。');
                    lines.push('行 3: 示例数据 ' + Math.random().toString(36).substring(7));
                    lines.push('行 4: 更多示例内容...');
                }
                return lines.join('\n');
            }

            function batchDownload() {
                if (selectedFileIds.size === 0) return;
                const ids = Array.from(selectedFileIds);
                ids.forEach((id, index) => {
                    const f = fileData.find(fd => fd.id === id);
                    if (f && !downloadQueue.some(d => d.id === id && d.status === 'downloading')) {
                        // 错开启动
                        setTimeout(() => {
                            simulateDownload(f.id, f.name, f.size);
                        }, index * 400);
                    }
                });
                selectedFileIds.clear();
                updateSelectionVisuals();
                renderFileArea();
            }

            function renderDownloadPanel() {
                if (downloadQueue.length === 0) {
                    dlList.innerHTML =
                        '<div style="text-align:center;padding:1.5rem;color:var(--md-sys-color-on-surface-variant);font-size:0.8125rem;">暂无下载任务</div>';
                    dlQueueCount.textContent = '0 项';
                    dlClearArea.style.display = 'none';
                } else {
                    dlQueueCount.textContent = downloadQueue.length + ' 项';
                    dlList.innerHTML = downloadQueue.map(d => renderDownloadPanelItemHTML(d)).join('');
                    updateDlClearButton();
                }
            }

            function renderDownloadPanelItem(dlItem) {
                const itemEl = dlList.querySelector(`[data-dl-queue-id="${dlItem.id}"]`);
                if (itemEl) {
                    const progressFill = itemEl.querySelector('.download-panel__progress-fill');
                    const statusEl = itemEl.querySelector('.download-panel__item-status');
                    if (progressFill) progressFill.style.width = dlItem.progress + '%';
                    if (statusEl) {
                        if (dlItem.status === 'done') statusEl.textContent = '完成';
                        else if (dlItem.status === 'downloading') statusEl.textContent = dlItem.progress + '%';
                        else statusEl.textContent = '等待中';
                    }
                }
            }

            function renderDownloadPanelItemHTML(dlItem) {
                let statusText = '等待中';
                if (dlItem.status === 'downloading') statusText = dlItem.progress + '%';
                if (dlItem.status === 'done') statusText = '完成';
                const iconName = dlItem.status === 'done' ? 'check_circle' :
                    dlItem.status === 'downloading' ? 'downloading' : 'schedule';
                const iconColor = dlItem.status === 'done' ? 'color:#2d6b4f;' :
                    dlItem.status === 'downloading' ? 'color:var(--md-sys-color-primary);' : '';
                return `
                <div class="download-panel__item" data-dl-queue-id="${dlItem.id}">
                    <span class="material-symbols-rounded icon-sm" style="${iconColor}">${iconName}</span>
                    <span class="download-panel__item-name" title="${dlItem.name}">${dlItem.name}</span>
                    <span class="download-panel__item-status">${statusText}</span>
                    <div class="download-panel__progress">
                        <div class="download-panel__progress-fill" style="width:${dlItem.progress}%;"></div>
                    </div>
                </div>`;
            }

            function updateDlClearButton() {
                const hasDone = downloadQueue.some(d => d.status === 'done');
                dlClearArea.style.display = hasDone ? 'block' : 'none';
            }

            function showDownloadPanel() {
                downloadPanel.classList.add('visible');
            }

            function hideDownloadPanel() {
                downloadPanel.classList.remove('visible');
            }

            // ==================== 事件处理 ====================
            // 搜索
            searchInput.addEventListener('input', function() {
                searchQuery = this.value;
                searchClear.classList.toggle('visible', searchQuery.length > 0);
                selectedFileIds.clear();
                renderFileArea();
            });
            searchClear.addEventListener('click', function() {
                searchInput.value = '';
                searchQuery = '';
                searchClear.classList.remove('visible');
                selectedFileIds.clear();
                renderFileArea();
                searchInput.focus();
            });

            // 文件区域事件委托
            fileArea.addEventListener('click', function(e) {
                // 下载按钮点击
                const dlBtn = e.target.closest('[data-dl-id]');
                if (dlBtn) {
                    e.stopPropagation();
                    e.preventDefault();
                    const fid = parseInt(dlBtn.getAttribute('data-dl-id'));
                    const fname = dlBtn.getAttribute('data-dl-name');
                    const f = fileData.find(fd => fd.id === fid);
                    if (f && getDownloadState(fid) !== 'downloading') {
                        simulateDownload(fid, fname, f.size);
                    }
                    return;
                }

                // 复选框点击
                const cb = e.target.closest('input[type="checkbox"]');
                if (cb) {
                    e.stopPropagation();
                    const fid = parseInt(cb.getAttribute('data-file-id'));
                    if (cb.checked) {
                        selectedFileIds.add(fid);
                    } else {
                        selectedFileIds.delete(fid);
                    }
                    updateSelectionVisuals();
                    return;
                }

                // 文件卡片/行点击
                const fileEl = e.target.closest('[data-file-id]');
                if (fileEl) {
                    const fid = parseInt(fileEl.getAttribute('data-file-id'));
                    const idx = parseInt(fileEl.getAttribute('data-index'));
                    if (e.shiftKey && lastClickedIndex >= 0) {
                        // Shift范围选择
                        const files = getFilteredFiles();
                        const start = Math.min(lastClickedIndex, idx);
                        const end = Math.max(lastClickedIndex, idx);
                        for (let i = start; i <= end; i++) {
                            if (files[i]) selectedFileIds.add(files[i].id);
                        }
                    } else if (e.ctrlKey || e.metaKey) {
                        // Ctrl切换选择
                        if (selectedFileIds.has(fid)) {
                            selectedFileIds.delete(fid);
                        } else {
                            selectedFileIds.add(fid);
                        }
                    } else {
                        // 普通点击
                        if (selectedFileIds.size === 1 && selectedFileIds.has(fid)) {
                            selectedFileIds.clear();
                        } else {
                            selectedFileIds.clear();
                            selectedFileIds.add(fid);
                        }
                    }
                    lastClickedIndex = idx;
                    updateSelectionVisuals();
                    return;
                }
            });

            // 键盘导航
            fileArea.addEventListener('keydown', function(e) {
                const fileEl = e.target.closest('[data-file-id]');
                if (!fileEl) return;
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    const fid = parseInt(fileEl.getAttribute('data-file-id'));
                    if (selectedFileIds.has(fid)) {
                        selectedFileIds.delete(fid);
                    } else {
                        if (!e.ctrlKey && !e.metaKey) selectedFileIds.clear();
                        selectedFileIds.add(fid);
                    }
                    updateSelectionVisuals();
                }
            });

            // 全选按钮
            btnSelectAll.addEventListener('click', function() {
                const files = getFilteredFiles();
                if (selectedFileIds.size === files.length && files.length > 0) {
                    selectedFileIds.clear();
                } else {
                    files.forEach(f => selectedFileIds.add(f.id));
                }
                updateSelectionVisuals();
                renderFileArea();
            });

            // 批量下载
            $('#btnBatchDownload').addEventListener('click', batchDownload);
            $('#btnBatchClear').addEventListener('click', function() {
                selectedFileIds.clear();
                updateSelectionVisuals();
                renderFileArea();
            });

            // 下载面板
            $('#btnDlPanelClose').addEventListener('click', hideDownloadPanel);
            $('#btnDlClear').addEventListener('click', function() {
                downloadQueue = downloadQueue.filter(d => d.status !== 'done' && d.status !== 'error');
                renderDownloadPanel();
                renderFileArea();
                if (downloadQueue.length === 0) hideDownloadPanel();
            });

            // 视图切换
            btnViewToggle.addEventListener('click', function() {
                currentView = currentView === 'grid' ? 'list' : 'grid';
                const iconEl = this.querySelector('.material-symbols-rounded');
                iconEl.textContent = currentView === 'grid' ? 'grid_view' : 'view_list';
                this.setAttribute('aria-label', currentView === 'grid' ? '切换为列表视图' : '切换为网格视图');
                this.title = currentView === 'grid' ? '切换为列表视图' : '切换为网格视图';
                renderFileArea();
            });

            // 主题切换
            btnThemeToggle.addEventListener('click', function() {
                isDarkTheme = !isDarkTheme;
                document.body.classList.toggle('dark-theme', isDarkTheme);
                const iconEl = this.querySelector('.material-symbols-rounded');
                iconEl.textContent = isDarkTheme ? 'dark_mode' : 'light_mode';
                this.setAttribute('aria-label', isDarkTheme ? '切换为浅色主题' : '切换为深色主题');
                this.title = isDarkTheme ? '切换为浅色主题' : '切换为深色主题';
                try { localStorage.setItem('filehub-theme', isDarkTheme ? 'dark' : 'light'); } catch (e) {}
                renderFileArea();
            });

            // 排序chips
            $('#sortChips').addEventListener('click', function(e) {
                const chip = e.target.closest('.md-chip');
                if (!chip) return;
                const sortVal = chip.getAttribute('data-sort');
                if (sortVal && sortVal !== currentSort) {
                    currentSort = sortVal;
                    $$('#sortChips .md-chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    selectedFileIds.clear();
                    renderFileArea();
                }
            });

            // 侧边导航过滤
            navDrawer.addEventListener('click', function(e) {
                const item = e.target.closest('.nav-drawer__item');
                if (!item) return;
                const filterVal = item.getAttribute('data-filter');
                if (filterVal && filterVal !== currentFilter) {
                    currentFilter = filterVal;
                    $$('.nav-drawer__item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    selectedFileIds.clear();
                    renderFileArea();
                    // 移动端关闭抽屉
                    if (window.innerWidth < 1024) {
                        closeNavDrawer();
                    }
                }
            });

            // 移动端菜单
            $('#menuBtn').addEventListener('click', toggleNavDrawer);
            navOverlay.addEventListener('click', closeNavDrawer);

            function toggleNavDrawer() {
                const isOpen = navDrawer.classList.contains('open');
                if (isOpen) {
                    closeNavDrawer();
                } else {
                    openNavDrawer();
                }
            }

            function openNavDrawer() {
                navDrawer.classList.add('open');
                navOverlay.classList.add('open');
                document.body.style.overflow = 'hidden';
            }

            function closeNavDrawer() {
                navDrawer.classList.remove('open');
                navOverlay.classList.remove('open');
                document.body.style.overflow = '';
            }

            // 全局键盘快捷键
            document.addEventListener('keydown', function(e) {
                // Escape清除选择
                if (e.key === 'Escape') {
                    if (selectedFileIds.size > 0) {
                        selectedFileIds.clear();
                        updateSelectionVisuals();
                        renderFileArea();
                    }
                    if (downloadPanel.classList.contains('visible') && downloadQueue.every(d => d.status ===
                            'done')) {
                        hideDownloadPanel();
                    }
                }
                // Ctrl+A全选
                if ((e.ctrlKey || e.metaKey) && e.key === 'a' && document.activeElement === document.body) {
                    e.preventDefault();
                    const files = getFilteredFiles();
                    files.forEach(f => selectedFileIds.add(f.id));
                    updateSelectionVisuals();
                    renderFileArea();
                }
            });

            // 窗口大小变化时更新
            let resizeDebounce;
            window.addEventListener('resize', function() {
                clearTimeout(resizeDebounce);
                resizeDebounce = setTimeout(() => {
                    if (window.innerWidth >= 1024) {
                        closeNavDrawer();
                    }
                    updateStorageStats();
                }, 200);
            });

            // ==================== 初始化 ====================
            function init() {
                // 恢复主题
                try {
                    const savedTheme = localStorage.getItem('filehub-theme');
                    if (savedTheme === 'dark') {
                        isDarkTheme = true;
                        document.body.classList.add('dark-theme');
                        btnThemeToggle.querySelector('.material-symbols-rounded').textContent = 'dark_mode';
                        btnThemeToggle.setAttribute('aria-label', '切换为浅色主题');
                        btnThemeToggle.title = '切换为浅色主题';
                    }
                } catch (e) {}

                // 初始渲染
                renderFileArea();
                updateStorageStats();
                updateNavBadges();

                // 如果移动端，确保抽屉关闭
                if (window.innerWidth < 1024) {
                    closeNavDrawer();
                }
            }

            init();
            console.log('FileHub - 文件下载中心已就绪');
            console.log('功能: 搜索过滤 | 类型筛选 | 排序 | 网格/列表视图 | 多选批量下载 | 下载队列 | 深色主题 | MD3设计');
            console.log('键盘快捷键: Ctrl+A 全选 | Esc 清除选择 | Shift+点击 范围选择 | Ctrl+点击 多选');
        })();
    </script>
</body>
</html>
