<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileHub - 文件下载中心</title>

    <!-- Material Symbols Rounded 图标字体 -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <!-- Google Fonts - Roboto (MD3 推荐字体) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* ========== MD3 亮色主题色彩令牌 ========== */
            --md-sys-color-primary: #3b5cb8;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #dbe1ff;
            --md-sys-color-on-primary-container: #00174b;

            --md-sys-color-secondary: #595d72;
            --md-sys-color-on-secondary: #ffffff;
            --md-sys-color-secondary-container: #dde1f9;
            --md-sys-color-on-secondary-container: #161a2c;

            --md-sys-color-tertiary: #745577;
            --md-sys-color-on-tertiary: #ffffff;
            --md-sys-color-tertiary-container: #fdd7fd;
            --md-sys-color-on-tertiary-container: #2c132f;

            --md-sys-color-error: #ba1a1a;
            --md-sys-color-on-error: #ffffff;
            --md-sys-color-error-container: #ffdad6;
            --md-sys-color-on-error-container: #410002;

            --md-sys-color-surface: #faf8ff;
            --md-sys-color-on-surface: #1a1b21;
            --md-sys-color-surface-variant: #e1e2ec;
            --md-sys-color-on-surface-variant: #44464f;
            --md-sys-color-surface-container-lowest: #ffffff;
            --md-sys-color-surface-container-low: #f4f2fb;
            --md-sys-color-surface-container: #eeecf5;
            --md-sys-color-surface-container-high: #e8e6ef;
            --md-sys-color-surface-container-highest: #e2e1e9;

            --md-sys-color-outline: #74767f;
            --md-sys-color-outline-variant: #c4c5cf;
            --md-sys-color-outline-strong: #3e4048;

            --md-sys-color-inverse-surface: #2f3037;
            --md-sys-color-inverse-on-surface: #f1f0f7;
            --md-sys-color-inverse-primary: #b3c5ff;

            --md-sys-color-scrim: #000000;
            --md-sys-color-shadow: #000000;

            /* MD3 Elevation - 亮色 */
            --md-elevation-level0: none;
            --md-elevation-level1: 0px 1px 2px 0px rgba(0, 0, 0, 0.08), 0px 1px 3px 1px rgba(0, 0, 0, 0.06);
            --md-elevation-level2: 0px 1px 2px 0px rgba(0, 0, 0, 0.10), 0px 2px 6px 2px rgba(0, 0, 0, 0.06);
            --md-elevation-level3: 0px 1px 3px 0px rgba(0, 0, 0, 0.12), 0px 4px 8px 3px rgba(0, 0, 0, 0.06);
            --md-elevation-level4: 0px 2px 3px 0px rgba(0, 0, 0, 0.14), 0px 6px 10px 4px rgba(0, 0, 0, 0.06);
            --md-elevation-level5: 0px 3px 5px 0px rgba(0, 0, 0, 0.16), 0px 8px 12px 6px rgba(0, 0, 0, 0.06);

            /* MD3 Shape */
            --md-shape-extra-small: 4px;
            --md-shape-small: 8px;
            --md-shape-medium: 12px;
            --md-shape-large: 16px;
            --md-shape-extra-large: 28px;
            --md-shape-full: 9999px;

            /* MD3 过渡 */
            --md-transition-duration-short: 200ms;
            --md-transition-duration-medium: 350ms;
            --md-transition-duration-long: 500ms;
            --md-easing-standard: cubic-bezier(0.2, 0.0, 0, 1.0);
            --md-easing-emphasized: cubic-bezier(0.05, 0.7, 0.1, 1.0);

            /* 文件类型指示色 */
            --file-type-document: #3b5cb8;
            --file-type-image: #c75b39;
            --file-type-video: #7c3a5e;
            --file-type-audio: #5d4ea0;
            --file-type-archive: #6d5e3f;
            --file-type-code: #2d6b4f;
            --file-type-spreadsheet: #3b7340;
            --file-type-presentation: #b84a2d;
            --file-type-other: #5f6368;
        }

        /* ========== 暗色主题 ========== */
        body.dark-theme {
            --md-sys-color-primary: #b3c5ff;
            --md-sys-color-on-primary: #002c79;
            --md-sys-color-primary-container: #1f44a0;
            --md-sys-color-on-primary-container: #dbe1ff;

            --md-sys-color-secondary: #c1c5dd;
            --md-sys-color-on-secondary: #2b2f42;
            --md-sys-color-secondary-container: #414659;
            --md-sys-color-on-secondary-container: #dde1f9;

            --md-sys-color-tertiary: #e0bbdf;
            --md-sys-color-on-tertiary: #422845;
            --md-sys-color-tertiary-container: #5b3e5d;
            --md-sys-color-on-tertiary-container: #fdd7fd;

            --md-sys-color-error: #ffb4ab;
            --md-sys-color-on-error: #690005;
            --md-sys-color-error-container: #93000a;
            --md-sys-color-on-error-container: #ffdad6;

            --md-sys-color-surface: #121318;
            --md-sys-color-on-surface: #e2e1e9;
            --md-sys-color-surface-variant: #44464f;
            --md-sys-color-on-surface-variant: #c4c5cf;
            --md-sys-color-surface-container-lowest: #0d0e13;
            --md-sys-color-surface-container-low: #1a1b21;
            --md-sys-color-surface-container: #1e1f25;
            --md-sys-color-surface-container-high: #292a30;
            --md-sys-color-surface-container-highest: #34353b;

            --md-sys-color-outline: #8e9099;
            --md-sys-color-outline-variant: #44464f;
            --md-sys-color-outline-strong: #babbc4;

            --md-sys-color-inverse-surface: #e2e1e9;
            --md-sys-color-inverse-on-surface: #2f3037;
            --md-sys-color-inverse-primary: #3b5cb8;

            --md-sys-color-scrim: #000000;
            --md-sys-color-shadow: #000000;

            --md-elevation-level1: 0px 1px 2px 0px rgba(0, 0, 0, 0.25), 0px 1px 3px 1px rgba(0, 0, 0, 0.18);
            --md-elevation-level2: 0px 1px 2px 0px rgba(0, 0, 0, 0.30), 0px 2px 6px 2px rgba(0, 0, 0, 0.18);
            --md-elevation-level3: 0px 1px 3px 0px rgba(0, 0, 0, 0.35), 0px 4px 8px 3px rgba(0, 0, 0, 0.18);
            --md-elevation-level4: 0px 2px 3px 0px rgba(0, 0, 0, 0.38), 0px 6px 10px 4px rgba(0, 0, 0, 0.18);
            --md-elevation-level5: 0px 3px 5px 0px rgba(0, 0, 0, 0.42), 0px 8px 12px 6px rgba(0, 0, 0, 0.18);

            --file-type-document: #b3c5ff;
            --file-type-image: #ffb59e;
            --file-type-video: #e8b3d4;
            --file-type-audio: #c8bfff;
            --file-type-archive: #dcc78b;
            --file-type-code: #8cd4a8;
            --file-type-spreadsheet: #a0d6a5;
            --file-type-presentation: #ffb39b;
            --file-type-other: #bdc1c6;
        }

        /* ========== 全局重置与基础样式 ========== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        body {
            font-family: 'Roboto', system-ui, -apple-system, sans-serif;
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            line-height: 1.5;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color var(--md-transition-duration-medium) var(--md-easing-standard),
                color var(--md-transition-duration-medium) var(--md-easing-standard);
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ========== MD3 排版层级 ========== */
        .md-display-small {
            font-size: 2.25rem;
            font-weight: 400;
            line-height: 2.75rem;
            letter-spacing: 0;
        }
        .md-headline-medium {
            font-size: 1.75rem;
            font-weight: 400;
            line-height: 2.25rem;
            letter-spacing: 0;
        }
        .md-headline-small {
            font-size: 1.5rem;
            font-weight: 400;
            line-height: 2rem;
            letter-spacing: 0;
        }
        .md-title-large {
            font-size: 1.375rem;
            font-weight: 400;
            line-height: 1.75rem;
            letter-spacing: 0;
        }
        .md-title-medium {
            font-size: 1rem;
            font-weight: 500;
            line-height: 1.5rem;
            letter-spacing: 0.009375rem;
        }
        .md-title-small {
            font-size: 0.875rem;
            font-weight: 500;
            line-height: 1.25rem;
            letter-spacing: 0.00625rem;
        }
        .md-body-large {
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.5rem;
            letter-spacing: 0.03125rem;
        }
        .md-body-medium {
            font-size: 0.875rem;
            font-weight: 400;
            line-height: 1.25rem;
            letter-spacing: 0.015625rem;
        }
        .md-body-small {
            font-size: 0.75rem;
            font-weight: 400;
            line-height: 1rem;
            letter-spacing: 0.025rem;
        }
        .md-label-large {
            font-size: 0.875rem;
            font-weight: 500;
            line-height: 1.25rem;
            letter-spacing: 0.00625rem;
        }
        .md-label-medium {
            font-size: 0.75rem;
            font-weight: 500;
            line-height: 1rem;
            letter-spacing: 0.03125rem;
        }
        .md-label-small {
            font-size: 0.6875rem;
            font-weight: 500;
            line-height: 1rem;
            letter-spacing: 0.03125rem;
        }

        /* ========== Material Symbols 图标基础样式 ========== */
        .material-symbols-rounded {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 1.25rem;
            vertical-align: middle;
            display: inline-block;
            line-height: 1;
            flex-shrink: 0;
        }
        .material-symbols-rounded.icon-filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-rounded.icon-lg {
            font-size: 1.75rem;
        }
        .material-symbols-rounded.icon-xl {
            font-size: 2.5rem;
        }
        .material-symbols-rounded.icon-sm {
            font-size: 1rem;
        }

        /* ========== 应用布局 ========== */
        .app-container {
            display: flex;
            flex: 1;
            min-height: 100vh;
            position: relative;
        }

        /* ========== 顶部应用栏 ========== */
        .app-bar {
            position: sticky;
            top: 0;
            z-index: 40;
            background-color: var(--md-sys-color-surface-container);
            border-bottom: 1px solid var(--md-sys-color-outline-variant);
            padding: 0 1rem;
            height: 4rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: background-color var(--md-transition-duration-medium) var(--md-easing-standard),
                border-color var(--md-transition-duration-medium) var(--md-easing-standard);
            box-shadow: var(--md-elevation-level1);
        }
        .app-bar__brand {
            display: flex;
            align-items: center;
            gap: 0.625rem;
            font-weight: 600;
            font-size: 1.25rem;
            color: var(--md-sys-color-on-surface);
            letter-spacing: -0.01em;
            flex-shrink: 0;
        }
        .app-bar__brand .brand-icon {
            width: 2.25rem;
            height: 2.25rem;
            border-radius: var(--md-shape-medium);
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.375rem;
        }
        .app-bar__spacer {
            flex: 1;
        }
        .app-bar__search-wrapper {
            position: relative;
            flex: 1;
            max-width: 28rem;
            min-width: 10rem;
        }
        .app-bar__search {
            width: 100%;
            height: 2.75rem;
            border-radius: var(--md-shape-full);
            border: 1px solid var(--md-sys-color-outline-variant);
            background-color: var(--md-sys-color-surface-container-high);
            color: var(--md-sys-color-on-surface);
            padding: 0 1rem 0 2.75rem;
            font-size: 0.9375rem;
            font-family: inherit;
            outline: none;
            transition: all var(--md-transition-duration-short) var(--md-easing-standard);
        }
        .app-bar__search:focus {
            border-color: var(--md-sys-color-primary);
            background-color: var(--md-sys-color-surface-container-lowest);
            box-shadow: 0 0 0 3px rgba(59, 92, 184, 0.12);
        }
        .app-bar__search::placeholder {
            color: var(--md-sys-color-on-surface-variant);
            opacity: 0.7;
        }
        .app-bar__search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--md-sys-color-on-surface-variant);
            pointer-events: none;
            font-size: 1.25rem;
        }
        .app-bar__search-clear {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--md-sys-color-on-surface-variant);
            padding: 0.25rem;
            border-radius: var(--md-shape-full);
            display: none;
            align-items: center;
            justify-content: center;
            transition: background-color var(--md-transition-duration-short) var(--md-easing-standard);
        }
        .app-bar__search-clear.visible {
            display: flex;
        }
        .app-bar__search-clear:hover {
            background-color: var(--md-sys-color-surface-container-highest);
        }
        .app-bar__actions {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            flex-shrink: 0;
        }

        /* ========== MD3 图标按钮 ========== */
        .md-icon-btn {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: var(--md-shape-full);
            border: none;
            background: transparent;
            cursor: pointer;
            color: var(--md-sys-color-on-surface-variant);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: background-color var(--md-transition-duration-short) var(--md-easing-standard),
                color var(--md-transition-duration-short) var(--md-easing-standard);
            flex-shrink: 0;
            font-family: inherit;
        }
        .md-icon-btn:hover {
            background-color: rgba(68, 70, 79, 0.08);
        }
        .md-icon-btn:active {
            background-color: rgba(68, 70, 79, 0.14);
        }
        .md-icon-btn.toggle-active {
            background-color: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
        }
        .md-icon-btn.toggle-active:hover {
            background-color: var(--md-sys-color-secondary-container);
            filter: brightness(0.95);
        }

        /* ========== 主内容区 ========== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background-color: var(--md-sys-color-surface);
            transition: background-color var(--md-transition-duration-medium) var(--md-easing-standard);
        }

        /* ========== 侧边导航栏 ========== */
        .nav-drawer {
            width: 17.5rem;
            flex-shrink: 0;
            background-color: var(--md-sys-color-surface-container-low);
            border-right: 1px solid var(--md-sys-color-outline-variant);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            transition: all var(--md-transition-duration-medium) var(--md-easing-standard);
            z-index: 30;
            position: sticky;
            top: 4rem;
            height: calc(100vh - 4rem);
        }
        .nav-drawer__section {
            padding: 0.75rem 0.5rem;
            border-bottom: 1px solid var(--md-sys-color-outline-variant);
        }
        .nav-drawer__section:last-child {
            border-bottom: none;
        }
        .nav-drawer__section-title {
            padding: 0.375rem 0.75rem;
            color: var(--md-sys-color-on-surface-variant);
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .nav-drawer__item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.625rem 0.75rem;
            border-radius: var(--md-shape-full);
            cursor: pointer;
            transition: all var(--md-transition-duration-short) var(--md-easing-standard);
            color: var(--md-sys-color-on-surface-variant);
            position: relative;
            font-size: 0.875rem;
            font-weight: 500;
        }
        .nav-drawer__item:hover {
            background-color: rgba(68, 70, 79, 0.08);
        }
        .nav-drawer__item.active {
            background-color: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
            font-weight: 600;
        }
        .nav-drawer__item .item-badge {
            margin-left: auto;
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            font-size: 0.6875rem;
            font-weight: 600;
            padding: 0.125rem 0.5rem;
            border-radius: var(--md-shape-full);
            min-width: 1.5rem;
            text-align: center;
        }
        .nav-drawer__item.active .item-badge {
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
        }
        .nav-drawer__storage-info {
            padding: 0.75rem;
        }
        .storage-bar {
            height: 0.5rem;
            border-radius: var(--md-shape-full);
            background-color: var(--md-sys-color-surface-variant);
            overflow: hidden;
            display: flex;
            margin-bottom: 0.5rem;
        }
        .storage-bar__segment {
            height: 100%;
            transition: width var(--md-transition-duration-long) var(--md-easing-emphasized);
        }
        .storage-bar__segment.seg-doc {
            background-color: var(--file-type-document);
        }
        .storage-bar__segment.seg-img {
            background-color: var(--file-type-image);
        }
        .storage-bar__segment.seg-vid {
            background-color: var(--file-type-video);
        }
        .storage-bar__segment.seg-aud {
            background-color: var(--file-type-audio);
        }
        .storage-bar__segment.seg-arc {
            background-color: var(--file-type-archive);
        }
        .storage-bar__segment.seg-code {
            background-color: var(--file-type-code);
        }
        .storage-bar__segment.seg-other {
            background-color: var(--file-type-other);
        }
        .storage-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem 0.75rem;
        }
        .storage-legend__item {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.6875rem;
            color: var(--md-sys-color-on-surface-variant);
        }
        .storage-legend__dot {
            width: 0.5rem;
            height: 0.5rem;
            border-radius: var(--md-shape-full);
            flex-shrink: 0;
        }

        /* ========== 工具栏区域 ========== */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--md-sys-color-outline-variant);
            background-color: var(--md-sys-color-surface-container-lowest);
            transition: all var(--md-transition-duration-medium) var(--md-easing-standard);
            min-height: 3.5rem;
        }
        .toolbar__info {
            font-size: 0.875rem;
            color: var(--md-sys-color-on-surface-variant);
            flex-shrink: 0;
        }
        .toolbar__spacer {
            flex: 1;
            min-width: 0.5rem;
        }
        .toolbar__chip-group {
            display: flex;
            gap: 0.375rem;
            flex-wrap: wrap;
        }
        .md-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.375rem 1rem;
            border-radius: var(--md-shape-small);
            border: 1px solid var(--md-sys-color-outline-variant);
            background-color: var(--md-sys-color-surface-container);
            cursor: pointer;
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--md-sys-color-on-surface-variant);
            transition: all var(--md-transition-duration-short) var(--md-easing-standard);
            white-space: nowrap;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }
        .md-chip:hover {
            background-color: var(--md-sys-color-surface-container-high);
        }
        .md-chip.active {
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            border-color: transparent;
            font-weight: 600;
        }
        .md-chip .chip-icon {
            font-size: 1rem;
        }

        /* ========== 批量操作栏 ========== */
        .batch-bar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.625rem 1.25rem;
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            border-radius: var(--md-shape-medium);
            margin: 0.75rem 1.25rem 0;
            box-shadow: var(--md-elevation-level2);
            transition: all var(--md-transition-duration-medium) var(--md-easing-standard);
            transform-origin: top center;
            animation: batchBarIn var(--md-transition-duration-medium) var(--md-easing-emphasized);
            font-size: 0.875rem;
            font-weight: 500;
        }
        @keyframes batchBarIn {
            from {
                opacity: 0;
                transform: translateY(-0.75rem);
                max-height: 0;
            }
            to {
                opacity: 1;
                transform: translateY(0);
                max-height: 4rem;
            }
        }
        .batch-bar .md-icon-btn {
            color: var(--md-sys-color-on-primary-container);
        }
        .batch-bar .md-icon-btn:hover {
            background-color: rgba(0, 23, 75, 0.08);
        }
        .batch-bar__count {
            font-weight: 600;
        }

        /* ========== 文件列表区域 ========== */
        .file-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.25rem;
            display: grid;
            gap: 0.75rem;
            align-content: start;
            transition: all var(--md-transition-duration-medium) var(--md-easing-standard);
            scroll-behavior: smooth;
        }
        /* 网格视图 */
        .file-area.view-grid {
            grid-template-columns: repeat(auto-fill, minmax(13.5rem, 1fr));
        }
        /* 列表视图 */
        .file-area.view-list {
            grid-template-columns: 1fr;
            gap: 0.25rem;
        }

        /* ========== 文件卡片（网格视图） ========== */
        .file-card {
            background-color: var(--md-sys-color-surface-container);
            border-radius: var(--md-shape-medium);
            padding: 1rem;
            cursor: pointer;
            position: relative;
            transition: all var(--md-transition-duration-short) var(--md-easing-standard);
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            box-shadow: var(--md-elevation-level1);
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .file-card:hover {
            box-shadow: var(--md-elevation-level2);
            background-color: var(--md-sys-color-surface-container-high);
            border-color: var(--md-sys-color-outline-variant);
        }
        .file-card:focus-visible {
            border-color: var(--md-sys-color-primary);
            box-shadow: 0 0 0 4px rgba(59, 92, 184, 0.18);
        }
        .file-card.selected {
            border-color: var(--md-sys-color-primary);
            background-color: var(--md-sys-color-primary-container);
            box-shadow: var(--md-elevation-level2);
        }
        .file-card__checkbox {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            z-index: 2;
            width: 1.5rem;
            height: 1.5rem;
            border-radius: var(--md-shape-extra-small);
            cursor: pointer;
            accent-color: var(--md-sys-color-primary);
            opacity: 0;
            transition: opacity var(--md-transition-duration-short) var(--md-easing-standard);
            pointer-events: auto;
        }
        .file-card:hover .file-card__checkbox,
        .file-card.selected .file-card__checkbox,
        .file-card__checkbox:checked {
            opacity: 1;
        }
        .file-card__icon-area {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: var(--md-shape-medium);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
        }
        .file-card__icon-area.doc {
            background-color: #e8ecff;
            color: var(--file-type-document);
        }
        .file-card__icon-area.img {
            background-color: #fde8e0;
            color: var(--file-type-image);
        }
        .file-card__icon-area.vid {
            background-color: #f3e0ec;
            color: var(--file-type-video);
        }
        .file-card__icon-area.aud {
            background-color: #ece8f8;
            color: var(--file-type-audio);
        }
        .file-card__icon-area.arc {
            background-color: #f5efe0;
            color: var(--file-type-archive);
        }
        .file-card__icon-area.code {
            background-color: #e0f0e6;
            color: var(--file-type-code);
        }
        .file-card__icon-area.other {
            background-color: #e8eaed;
            color: var(--file-type-other);
        }
        body.dark-theme .file-card__icon-area.doc {
            background-color: rgba(179, 197, 255, 0.15);
        }
        body.dark-theme .file-card__icon-area.img {
            background-color: rgba(255, 181, 158, 0.15);
        }
        body.dark-theme .file-card__icon-area.vid {
            background-color: rgba(232, 179, 212, 0.15);
        }
        body.dark-theme .file-card__icon-area.aud {
            background-color: rgba(200, 191, 255, 0.15);
        }
        body.dark-theme .file-card__icon-area.arc {
            background-color: rgba(220, 199, 139, 0.15);
        }
        body.dark-theme .file-card__icon-area.code {
            background-color: rgba(140, 212, 168, 0.15);
        }
        .file-card__name {
            font-weight: 500;
            font-size: 0.875rem;
            line-height: 1.3;
            color: var(--md-sys-color-on-surface);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            min-width: 0;
        }
        .file-card__meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: var(--md-sys-color-on-surface-variant);
            flex-wrap: wrap;
        }
        .file-card__size {
            font-weight: 500;
            white-space: nowrap;
        }
        .file-card__date {
            white-space: nowrap;
        }
        .file-card__actions-row {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            margin-top: auto;
            padding-top: 0.25rem;
        }
        .file-card__dl-btn {
            flex: 1;
            padding: 0.5rem 0.75rem;
            border-radius: var(--md-shape-full);
            border: none;
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8125rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.375rem;
            transition: all var(--md-transition-duration-short) var(--md-easing-standard);
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }
        .file-card__dl-btn:hover {
            filter: brightness(1.08);
            box-shadow: var(--md-elevation-level1);
        }
        .file-card__dl-btn:active {
            filter: brightness(0.92);
            transform: scale(0.97);
        }
        .file-card__dl-btn.downloading {
            background-color: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
            pointer-events: none;
        }
        .file-card__dl-btn.done {
            background-color: #2d6b4f;
            color: #ffffff;
        }

        /* ========== 文件行（列表视图） ========== */
        .file-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.625rem 1rem;
            border-radius: var(--md-shape-medium);
            cursor: pointer;
            transition: all var(--md-transition-duration-short) var(--md-easing-standard);
            background-color: transparent;
            border: 2px solid transparent;
            min-height: 3.25rem;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .file-row:hover {
            background-color: var(--md-sys-color-surface-container);
            border-color: var(--md-sys-color-outline-variant);
        }
        .file-row.selected {
            background-color: var(--md-sys-color-primary-container);
            border-color: var(--md-sys-color-primary);
        }
        .file-row:focus-visible {
            border-color: var(--md-sys-color-primary);
            box-shadow: 0 0 0 3px rgba(59, 92, 184, 0.15);
        }
        .file-row__checkbox {
            width: 1.25rem;
            height: 1.25rem;
            cursor: pointer;
            accent-color: var(--md-sys-color-primary);
            flex-shrink: 0;
            opacity: 0.6;
            transition: opacity var(--md-transition-duration-short) var(--md-easing-standard);
        }
        .file-row:hover .file-row__checkbox,
        .file-row.selected .file-row__checkbox,
        .file-row__checkbox:checked {
            opacity: 1;
        }
        .file-row__icon {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: var(--md-shape-small);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .file-row__icon.doc {
            background-color: #e8ecff;
            color: var(--file-type-document);
        }
        .file-row__icon.img {
            background-color: #fde8e0;
            color: var(--file-type-image);
        }
        .file-row__icon.vid {
            background-color: #f3e0ec;
            color: var(--file-type-video);
        }
        .file-row__icon.aud {
            background-color: #ece8f8;
            color: var(--file-type-audio);
        }
        .file-row__icon.arc {
            background-color: #f5efe0;
            color: var(--file-type-archive);
        }
        .file-row__icon.code {
            background-color: #e0f0e6;
            color: var(--file-type-code);
        }
        .file-row__icon.other {
            background-color: #e8eaed;
            color: var(--file-type-other);
        }
        body.dark-theme .file-row__icon.doc {
            background-color: rgba(179, 197, 255, 0.15);
        }
        body.dark-theme .file-row__icon.img {
            background-color: rgba(255, 181, 158, 0.15);
        }
        body.dark-theme .file-row__icon.vid {
            background-color: rgba(232, 179, 212, 0.15);
        }
        body.dark-theme .file-row__icon.aud {
            background-color: rgba(200, 191, 255, 0.15);
        }
        body.dark-theme .file-row__icon.arc {
            background-color: rgba(220, 199, 139, 0.15);
        }
        body.dark-theme .file-row__icon.code {
            background-color: rgba(140, 212, 168, 0.15);
        }
        .file-row__name {
            flex: 1;
            min-width: 0;
            font-weight: 500;
            font-size: 0.875rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--md-sys-color-on-surface);
        }
        .file-row__type {
            font-size: 0.75rem;
            color: var(--md-sys-color-on-surface-variant);
            width: 4rem;
            text-align: center;
            flex-shrink: 0;
            display: none;
        }
        .file-row__size {
            font-size: 0.8125rem;
            color: var(--md-sys-color-on-surface-variant);
            width: 5rem;
            text-align: right;
            flex-shrink: 0;
            font-weight: 500;
        }
        .file-row__date {
            font-size: 0.75rem;
            color: var(--md-sys-color-on-surface-variant);
            width: 7rem;
            text-align: right;
            flex-shrink: 0;
            display: none;
        }
        .file-row__dl-btn {
            padding: 0.375rem 1rem;
            border-radius: var(--md-shape-full);
            border: none;
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8125rem;
            flex-shrink: 0;
            transition: all var(--md-transition-duration-short) var(--md-easing-standard);
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        .file-row__dl-btn:hover {
            filter: brightness(1.08);
            box-shadow: var(--md-elevation-level1);
        }
        .file-row__dl-btn:active {
            filter: brightness(0.92);
            transform: scale(0.96);
        }
        .file-row__dl-btn.downloading {
            background-color: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
            pointer-events: none;
        }
        .file-row__dl-btn.done {
            background-color: #2d6b4f;
            color: #ffffff;
        }

        @media (min-width: 768px) {
            .file-row__type {
                display: block;
            }
            .file-row__date {
                display: block;
            }
        }

        /* ========== 空状态 ========== */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
            text-align: center;
            grid-column: 1 / -1;
            color: var(--md-sys-color-on-surface-variant);
            gap: 0.75rem;
        }
        .empty-state__icon {
            font-size: 4rem;
            opacity: 0.5;
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 48;
        }
        .empty-state__text {
            font-size: 1rem;
            font-weight: 500;
        }

        /* ========== 下载进度面板 ========== */
        .download-panel {
            position: fixed;
            bottom: 1.25rem;
            right: 1.25rem;
            z-index: 50;
            width: 22rem;
            max-width: calc(100vw - 2.5rem);
            background-color: var(--md-sys-color-surface-container-high);
            border-radius: var(--md-shape-large);
            box-shadow: var(--md-elevation-level4);
            border: 1px solid var(--md-sys-color-outline-variant);
            overflow: hidden;
            transition: all var(--md-transition-duration-medium) var(--md-easing-emphasized);
            display: none;
        }
        .download-panel.visible {
            display: block;
            animation: panelSlideUp var(--md-transition-duration-medium) var(--md-easing-emphasized);
        }
        @keyframes panelSlideUp {
            from {
                opacity: 0;
                transform: translateY(1.5rem);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .download-panel__header {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--md-sys-color-outline-variant);
            gap: 0.5rem;
            font-weight: 600;
            font-size: 0.9375rem;
            color: var(--md-sys-color-on-surface);
        }
        .download-panel__list {
            max-height: 18rem;
            overflow-y: auto;
            padding: 0.5rem;
        }
        .download-panel__item {
            display: flex;
            align-items: center;
            gap: 0.625rem;
            padding: 0.5rem 0.625rem;
            border-radius: var(--md-shape-small);
            transition: background-color var(--md-transition-duration-short) var(--md-easing-standard);
        }
        .download-panel__item:hover {
            background-color: var(--md-sys-color-surface-container);
        }
        .download-panel__item-name {
            flex: 1;
            min-width: 0;
            font-size: 0.8125rem;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--md-sys-color-on-surface);
        }
        .download-panel__item-status {
            font-size: 0.75rem;
            color: var(--md-sys-color-on-surface-variant);
            flex-shrink: 0;
        }
        .download-panel__progress {
            width: 3rem;
            height: 0.25rem;
            border-radius: var(--md-shape-full);
            background-color: var(--md-sys-color-surface-variant);
            overflow: hidden;
            flex-shrink: 0;
        }
        .download-panel__progress-fill {
            height: 100%;
            background-color: var(--md-sys-color-primary);
            border-radius: var(--md-shape-full);
            transition: width 0.15s linear;
        }
        .download-panel__clear {
            padding: 0.5rem 1rem;
            border-top: 1px solid var(--md-sys-color-outline-variant);
            text-align: center;
        }
        .download-panel__clear button {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--md-sys-color-primary);
            font-weight: 600;
            font-size: 0.8125rem;
            font-family: inherit;
            padding: 0.25rem 0.75rem;
            border-radius: var(--md-shape-full);
            transition: background-color var(--md-transition-duration-short) var(--md-easing-standard);
        }
        .download-panel__clear button:hover {
            background-color: rgba(59, 92, 184, 0.08);
        }

        /* ========== 滚动条美化 ========== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background-color: var(--md-sys-color-outline-variant);
            border-radius: var(--md-shape-full);
        }
        ::-webkit-scrollbar-thumb:hover {
            background-color: var(--md-sys-color-outline);
        }

        /* ========== 响应式 ========== */
        @media (max-width: 1023px) {
            .nav-drawer {
                position: fixed;
                left: -18rem;
                top: 4rem;
                height: calc(100vh - 4rem);
                z-index: 35;
                box-shadow: var(--md-elevation-level4);
                border-radius: 0 var(--md-shape-large) var(--md-shape-large) 0;
                width: 17.5rem;
            }
            .nav-drawer.open {
                left: 0;
            }
            .nav-drawer-overlay {
                position: fixed;
                inset: 0;
                background-color: rgba(0, 0, 0, 0.4);
                z-index: 34;
                display: none;
                top: 4rem;
            }
            .nav-drawer-overlay.open {
                display: block;
            }
            .app-bar__menu-btn {
                display: inline-flex !important;
            }
            .file-area.view-grid {
                grid-template-columns: repeat(auto-fill, minmax(10rem, 1fr));
            }
        }
        @media (min-width: 1024px) {
            .app-bar__menu-btn {
                display: none !important;
            }
            .nav-drawer-overlay {
                display: none !important;
            }
        }
        @media (max-width: 600px) {
            .app-bar {
                padding: 0 0.75rem;
                height: 3.5rem;
            }
            .app-bar__brand {
                font-size: 1rem;
                gap: 0.375rem;
            }
            .app-bar__brand .brand-icon {
                width: 1.75rem;
                height: 1.75rem;
                font-size: 1rem;
            }
            .app-bar__search-wrapper {
                max-width: none;
                min-width: 0;
            }
            .app-bar__search {
                height: 2.375rem;
                font-size: 0.8125rem;
                padding-left: 2.25rem;
            }
            .toolbar {
                padding: 0.5rem 0.75rem;
                gap: 0.375rem;
            }
            .file-area {
                padding: 0.5rem;
                gap: 0.5rem;
            }
            .file-area.view-grid {
                grid-template-columns: repeat(auto-fill, minmax(8rem, 1fr));
                gap: 0.375rem;
            }
            .file-card {
                padding: 0.625rem;
                gap: 0.375rem;
                border-radius: var(--md-shape-small);
            }
            .file-card__icon-area {
                width: 2.5rem;
                height: 2.5rem;
                border-radius: var(--md-shape-small);
            }
            .file-card__name {
                font-size: 0.75rem;
            }
            .file-card__meta {
                font-size: 0.6875rem;
            }
            .file-card__dl-btn {
                font-size: 0.6875rem;
                padding: 0.375rem 0.5rem;
            }
            .download-panel {
                bottom: 0.5rem;
                right: 0.5rem;
                width: calc(100vw - 1rem);
                max-width: none;
                border-radius: var(--md-shape-large) var(--md-shape-large) 0 0;
            }
            .batch-bar {
                margin: 0.5rem 0.5rem 0;
                padding: 0.5rem 0.75rem;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer">
        <!-- 侧边导航遮罩层 (移动端) -->
        <div class="nav-drawer-overlay" id="navOverlay"></div>

        <!-- 侧边导航栏 -->
        <aside class="nav-drawer" id="navDrawer">
            <div class="nav-drawer__section">
                <div class="nav-drawer__section-title">文件分类</div>

                    <span class="item-badge" id="badgeAll">0</span>
                </div>
                <div class="nav-drawer__item" data-filter="document">

                    <span class="item-badge" id="badgeDoc">0</span>

                    <span class="material-symbols-rounded">folder_zip</span>
                    <span>压缩包</span>
                    <span class="item-badge" id="badgeArc">0</span>

                    <span class="item-badge" id="badgeCode">0</span>
                </div>
            </div>
            <div class="nav-drawer__section">
                <div class="nav-drawer__section-title">存储概览</div>
                <div class="nav-drawer__storage-info">
                    <div class="storage-bar" id="storageBar">
                        <span class="storage-bar__segment seg-doc" style="width:0%"></span>
                        <span class="storage-bar__segment seg-img" style="width:0%"></span>
                        <span class="storage-bar__segment seg-vid" style="width:0%"></span>
                        <span class="storage-bar__segment seg-aud" style="width:0%"></span>
                        <span class="storage-bar__segment seg-arc" style="width:0%"></span>
                        <span class="storage-bar__segment seg-code" style="width:0%"></span>
                        <span class="storage-bar__segment seg-other" style="width:0%"></span>
                    </div>
                    <div class="storage-legend">
                        <span class="storage-legend__item"><span class="storage-legend__dot" style="background:var(--file-type-document)"></span>文档</span>
                        <span class="storage-legend__item"><span class="storage-legend__dot" style="background:var(--file-type-image)"></span>图片</span>
                        <span class="storage-legend__item"><span class="storage-legend__dot" style="background:var(--file-type-video)"></span>视频</span>
                        <span class="storage-legend__item"><span class="storage-legend__dot" style="background:var(--file-type-audio)"></span>音频</span>
                        <span class="storage-legend__item"><span class="storage-legend__dot" style="background:var(--file-type-archive)"></span>压缩</span>
                        <span class="storage-legend__item"><span class="storage-legend__dot" style="background:var(--file-type-code)"></span>代码</span>

            // ==================== 工具函数 ====================
            function formatBytes(bytes) {
                if (bytes === 0) return '0 B';
                const units = ['B', 'KB', 'MB', 'GB', 'TB'];
                const k = 1024;
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                const val = bytes / Math.pow(k, i);
                return val.toFixed(i === 0 ? 0 : 1) + ' ' + units[i];
            }

            function formatDate(dateStr) {
                const d = new Date(dateStr);
                const now = new Date();
                const diffMs = now - d;
                const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                if (diffDays === 0) return '今天';
                if (diffDays === 1) return '昨天';
                if (diffDays < 7) return diffDays + ' 天前';
                if (diffDays < 30) return Math.floor(diffDays / 7) + ' 周前';
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return y + '-' + m + '-' + day;
            }

            function getFileTypeCategory(ext) {

                    sh: 'code',

                return map[ext.toLowerCase()] || 'other';
            }

            // ==================== 过滤与排序 ====================
            function getFilteredFiles() {
                let files = [...fileData];
                if (currentFilter !== 'all') {
                    files = files.filter(f => f.type === currentFilter);
                }
                if (searchQuery.trim()) {
                    const q = searchQuery.trim().toLowerCase();
                    files = files.filter(f => f.name.toLowerCase().includes(q) || f.ext.toLowerCase().includes(q));
                }
                // 排序
                files.sort((a, b) => {
                    switch (currentSort) {
                        case 'name-asc':
                            return a.name.localeCompare(b.name, 'zh-Hans-CN', { sensitivity: 'base' });
                        case 'name-desc':
                            return b.name.localeCompare(a.name, 'zh-Hans-CN', { sensitivity: 'base' });
                        case 'size-desc':
                            return b.size - a.size;
                        case 'size-asc':
                            return a.size - b.size;
                        case 'date-desc':
                            return new Date(b.date) - new Date(a.date);
                        case 'date-asc':
                            return new Date(a.date) - new Date(b.date);
                        default:
                            return 0;
                    }
                });
                return files;
            }

            // ==================== 渲染 ====================
            function renderFileArea() {
                const files = getFilteredFiles();
                fileArea.className = 'file-area ' + (currentView === 'grid' ? 'view-grid' : 'view-list');
                fileArea.setAttribute('role', 'list');

                if (files.length === 0) {
                    fileArea.innerHTML = `
                        <div class="empty-state">
                            <span class="material-symbols-rounded empty-state__icon">folder_off</span>
                            <span class="empty-state__text">没有找到匹配的文件</span>
                            <span class="md-body-small" style="opacity:0.7;">尝试调整搜索条件或筛选类型</span>
                        </div>`;
                } else if (currentView === 'grid') {
                    fileArea.innerHTML = files.map((f, idx) => renderFileCard(f, idx)).join('');
                } else {
                    fileArea.innerHTML = files.map((f, idx) => renderFileRow(f, idx)).join('');
                }

                // 更新选中状态的视觉
                updateSelectionVisuals();
                // 更新工具栏信息
                updateToolbarInfo(files);
                // 更新存储统计
                updateStorageStats();
                // 更新导航徽章
                updateNavBadges();
            }

            function renderFileCard(f, idx) {
                const isSel = selectedFileIds.has(f.id);
                const selClass = isSel ? ' selected' : '';
                const dlState = getDownloadState(f.id);
                let dlBtnClass = '';
                let dlBtnText = '下载';
                let dlBtnIcon = 'download';
                if (dlState === 'downloading') {
                    dlBtnClass = ' downloading';
                    dlBtnText = '下载中...';
                    dlBtnIcon = 'hourglass_top';
                } else if (dlState === 'done') {
                    dlBtnClass = ' done';
                    dlBtnText = '已完成';
                    dlBtnIcon = 'check_circle';
                }
                return `
                <div class="file-card${selClass}" role="listitem" data-file-id="${f.id}" data-index="${idx}" tabindex="0"
                     aria-label="${f.name}, ${formatBytes(f.size)}, ${formatDate(f.date)}">
                    <input type="checkbox" class="file-card__checkbox" data-file-id="${f.id}"
                           ${isSel ? 'checked' : ''} aria-label="选择 ${f.name}">
                    <div class="file-card__icon-area ${f.iconCat}">
                        <span class="material-symbols-rounded icon-xl">${f.iconName}</span>
                    </div>
                    <span class="file-card__name" title="${f.name}">${f.name}</span>
                    <div class="file-card__meta">
                        <span class="file-card__size">${formatBytes(f.size)}</span>
                        <span>·</span>
                        <span class="file-card__date">${formatDate(f.date)}</span>
                    </div>
                    <div class="file-card__actions-row">
                        <button class="file-card__dl-btn${dlBtnClass}" data-dl-id="${f.id}" data-dl-name="${f.name}">
                            <span class="material-symbols-rounded icon-sm">${dlBtnIcon}</span>
                            <span>${dlBtnText}</span>
                        </button>
                    </div>
                </div>`;
            }

            function renderFileRow(f, idx) {
                const isSel = selectedFileIds.has(f.id);
                const selClass = isSel ? ' selected' : '';
                const dlState = getDownloadState(f.id);
                let dlBtnClass = '';
                let dlBtnText = '下载';
                let dlBtnIcon = 'download';
                if (dlState === 'downloading') {
                    dlBtnClass = ' downloading';
                    dlBtnText = '下载中';
                    dlBtnIcon = 'hourglass_top';
                } else if (dlState === 'done') {
                    dlBtnClass = ' done';
                    dlBtnText = '已完成';
                    dlBtnIcon = 'check_circle';

                return `
                <div class="file-row${selClass}" role="listitem" data-file-id="${f.id}" data-index="${idx}" tabindex="0"

                        <span class="material-symbols-rounded icon-sm">${dlBtnIcon}</span>

            }

            function getDownloadState(fileId) {
                const item = downloadQueue.find(d => d.id === fileId);
                if (!item) return 'none';
                return item.status;
            }

            function updateSelectionVisuals() {
                $$('.file-card, .file-row').forEach(el => {
                    const fid = parseInt(el.getAttribute('data-file-id'));
                    if (selectedFileIds.has(fid)) {
                        el.classList.add('selected');
                        const cb = el.querySelector('input[type="checkbox"]');
                        if (cb && !cb.checked) cb.checked = true;
                    } else {
                        el.classList.remove('selected');
                        const cb = el.querySelector('input[type="checkbox"]');
                        if (cb && cb.checked) cb.checked = false;
                    }
                });
                updateBatchBar();
            }

            function updateBatchBar() {
                if (selectedFileIds.size > 0) {
                    batchBar.style.display = 'flex';
                    batchCount.textContent = selectedFileIds.size;
                    let totalSize = 0;
